<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <!-- Gold stadium light, top-left -->
    <radialGradient id="gl" cx="20%" cy="5%" r="60%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.45"/>
      <stop offset="45%"  stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#080c14"  stop-opacity="0"/>
    </radialGradient>
    <!-- Purple/blue stadium light, top-right -->
    <radialGradient id="gr" cx="80%" cy="5%" r="60%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.40"/>
      <stop offset="45%"  stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080c14"  stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom fade to match email body -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="30%" stop-color="#080c14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Perspective line gradient (bright top, fades bottom) -->
    <linearGradient id="pline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a6fa8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a3a5c" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="600" height="200" fill="#080c14"/>

  <!-- Atmospheric base wash so it reads against dark email bg -->
  <rect width="600" height="200" fill="#0d1a2e" opacity="0.7"/>

  <!-- Perspective field lines from vanishing point (300, 8) -->
  <g stroke="url(#pline)" fill="none">
    <line x1="300" y1="8" x2="0"   y2="200" stroke-width="1.2"/>
    <line x1="300" y1="8" x2="50"  y2="200" stroke-width="1.1"/>
    <line x1="300" y1="8" x2="110" y2="200" stroke-width="1.0"/>
    <line x1="300" y1="8" x2="170" y2="200" stroke-width="0.9"/>
    <line x1="300" y1="8" x2="230" y2="200" stroke-width="0.8"/>
    <line x1="300" y1="8" x2="300" y2="200" stroke-width="0.8"/>
    <line x1="300" y1="8" x2="370" y2="200" stroke-width="0.8"/>
    <line x1="300" y1="8" x2="430" y2="200" stroke-width="0.9"/>
    <line x1="300" y1="8" x2="490" y2="200" stroke-width="1.0"/>
    <line x1="300" y1="8" x2="550" y2="200" stroke-width="1.1"/>
    <line x1="300" y1="8" x2="600" y2="200" stroke-width="1.2"/>
  </g>

  <!-- Horizontal yard lines (perspective foreshortened) -->
  <g stroke="#2a5580" fill="none">
    <line x1="260" y1="28"  x2="340" y2="28"  stroke-width="1.0" opacity="0.9"/>
    <line x1="220" y1="50"  x2="380" y2="50"  stroke-width="1.0" opacity="0.8"/>
    <line x1="175" y1="78"  x2="425" y2="78"  stroke-width="1.0" opacity="0.7"/>
    <line x1="128" y1="112" x2="472" y2="112" stroke-width="1.0" opacity="0.6"/>
    <line x1="78"  y1="152" x2="522" y2="152" stroke-width="1.0" opacity="0.5"/>
    <line x1="20"  y1="196" x2="580" y2="196" stroke-width="1.0" opacity="0.35"/>
  </g>

  <!-- Gold hash marks at center -->
  <g stroke="#f59e0b" fill="none" opacity="0.5">
    <line x1="293" y1="112" x2="307" y2="112" stroke-width="1.5"/>
    <line x1="293" y1="78"  x2="307" y2="78"  stroke-width="1.5"/>
    <line x1="293" y1="50"  x2="307" y2="50"  stroke-width="1.5"/>
    <line x1="265" y1="28"  x2="275" y2="28"  stroke-width="1.5"/>
    <line x1="325" y1="28"  x2="335" y2="28"  stroke-width="1.5"/>
  </g>

  <!-- Center circle -->
  <circle cx="300" cy="170" r="32" fill="none" stroke="#2a5580" stroke-width="1" opacity="0.5"/>
  <circle cx="300" cy="170" r="4"  fill="#3a6fa8" opacity="0.5"/>

  <!-- Vanishing point dot + beam -->
  <circle cx="300" cy="8" r="2.5" fill="#f59e0b" opacity="0.85"/>
  <rect x="299" y="8" width="2" height="16" fill="#f59e0b" opacity="0.4"/>

  <!-- Stadium light glows (applied over lines) -->
  <rect width="600" height="200" fill="url(#gl)"/>
  <rect width="600" height="200" fill="url(#gr)"/>

  <!-- Bottom fade for text transition -->
  <rect width="600" height="200" fill="url(#fade)"/>
</svg>
