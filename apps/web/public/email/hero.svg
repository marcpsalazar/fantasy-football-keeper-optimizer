<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <!-- Bright gold light burst, top-left -->
    <radialGradient id="gl" cx="18%" cy="0%" r="65%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.70"/>
      <stop offset="35%"  stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f2245"  stop-opacity="0"/>
    </radialGradient>
    <!-- Violet light burst, top-right -->
    <radialGradient id="gr" cx="82%" cy="0%" r="65%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.60"/>
      <stop offset="35%"  stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0f2245"  stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom fade to email body color -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="40%" stop-color="#0f2245" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080c14" stop-opacity="1"/>
    </linearGradient>
    <!-- Perspective line: bright at top, dimmer at bottom -->
    <linearGradient id="pl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6aaee8" stop-opacity="1.0"/>
      <stop offset="100%" stop-color="#2a5888" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Solid dark-navy base (clearly distinguishable from black) -->
  <rect width="600" height="200" fill="#0f2245"/>

  <!-- Perspective radial lines from vanishing point (300, 6) -->
  <g stroke="url(#pl)" fill="none">
    <line x1="300" y1="6" x2="0"   y2="200" stroke-width="1.4"/>
    <line x1="300" y1="6" x2="50"  y2="200" stroke-width="1.3"/>
    <line x1="300" y1="6" x2="110" y2="200" stroke-width="1.2"/>
    <line x1="300" y1="6" x2="170" y2="200" stroke-width="1.1"/>
    <line x1="300" y1="6" x2="230" y2="200" stroke-width="1.0"/>
    <line x1="300" y1="6" x2="300" y2="200" stroke-width="1.0"/>
    <line x1="300" y1="6" x2="370" y2="200" stroke-width="1.0"/>
    <line x1="300" y1="6" x2="430" y2="200" stroke-width="1.1"/>
    <line x1="300" y1="6" x2="490" y2="200" stroke-width="1.2"/>
    <line x1="300" y1="6" x2="550" y2="200" stroke-width="1.3"/>
    <line x1="300" y1="6" x2="600" y2="200" stroke-width="1.4"/>
  </g>

  <!-- Horizontal yard lines (perspective foreshortened, clearly visible) -->
  <g stroke="#5a95cc" fill="none">
    <line x1="264" y1="28"  x2="336" y2="28"  stroke-width="1.2" opacity="1.0"/>
    <line x1="222" y1="52"  x2="378" y2="52"  stroke-width="1.2" opacity="0.9"/>
    <line x1="176" y1="82"  x2="424" y2="82"  stroke-width="1.1" opacity="0.8"/>
    <line x1="126" y1="118" x2="474" y2="118" stroke-width="1.1" opacity="0.7"/>
    <line x1="72"  y1="158" x2="528" y2="158" stroke-width="1.0" opacity="0.55"/>
    <line x1="14"  y1="196" x2="586" y2="196" stroke-width="1.0" opacity="0.35"/>
  </g>

  <!-- Gold hash marks (center, clearly visible) -->
  <g stroke="#f59e0b" fill="none" stroke-width="2" opacity="0.7">
    <line x1="291" y1="118" x2="309" y2="118"/>
    <line x1="291" y1="82"  x2="309" y2="82"/>
    <line x1="291" y1="52"  x2="309" y2="52"/>
    <line x1="262" y1="28"  x2="274" y2="28"/>
    <line x1="326" y1="28"  x2="338" y2="28"/>
  </g>

  <!-- Center circle -->
  <circle cx="300" cy="168" r="30" fill="none" stroke="#5a95cc" stroke-width="1.2" opacity="0.6"/>
  <circle cx="300" cy="168" r="4"  fill="#5a95cc" opacity="0.7"/>

  <!-- Vanishing point bright dot -->
  <circle cx="300" cy="6" r="3" fill="#f59e0b" opacity="1.0"/>
  <rect   x="299" y="6" width="2" height="20" fill="#f59e0b" opacity="0.5"/>

  <!-- Stadium light glows (over lines) -->
  <rect width="600" height="200" fill="url(#gl)"/>
  <rect width="600" height="200" fill="url(#gr)"/>

  <!-- Bottom fade to seamlessly merge with email body -->
  <rect width="600" height="200" fill="url(#fade)"/>
</svg>
